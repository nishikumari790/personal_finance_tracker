<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BudgetIQ — Personal Finance Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════════════════════════ HEADER ═══════════════════════════════════ -->
<header>
  <div class="logo">Budget<span>IQ</span></div>
  <div class="header-actions">
    <button class="btn-icon" id="exportBtn" title="Export CSV">⬇</button>
    <button class="btn-icon" id="themeBtn"  title="Toggle theme">☀</button>
  </div>
</header>

<div class="container">

  <!-- ══════════════════════════ SUMMARY CARDS ══════════════════════════ -->
  <div class="cards-grid">

    <div class="card">
      <div class="accent-bar" style="background:var(--accent2)"></div>
      <div class="card-icon">💰</div>
      <div class="card-label">Total Spent</div>
      <div class="card-value" id="totalSpent" style="color:var(--accent2)">₹0</div>
      <div class="card-sub" id="spentSub">this month</div>
    </div>

    <div class="card">
      <div class="accent-bar" style="background:var(--accent3)"></div>
      <div class="card-icon">🎯</div>
      <div class="card-label">Budget Left</div>
      <div class="card-value" id="budgetLeft" style="color:var(--accent3)">₹0</div>
      <div class="budget-bar-wrap">
        <div class="budget-bar">
          <div class="budget-bar-fill" id="budgetBarFill" style="width:0%;background:var(--accent3)"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="accent-bar" style="background:var(--warning)"></div>
      <div class="card-icon">📋</div>
      <div class="card-label">Transactions</div>
      <div class="card-value" id="txCount" style="color:var(--warning)">0</div>
      <div class="card-sub" id="txSub">entries recorded</div>
    </div>

    <div class="card">
      <div class="accent-bar" style="background:var(--accent)"></div>
      <div class="card-icon">📊</div>
      <div class="card-label">Avg. / Day</div>
      <div class="card-value" id="avgDay" style="color:var(--accent)">₹0</div>
      <div class="card-sub">daily average</div>
    </div>

  </div><!-- /cards-grid -->

  <!-- ═══════════════════════════ MAIN GRID ═══════════════════════════ -->
  <div class="main-grid">

    <!-- LEFT COLUMN: Add Expense + Budget -->
    <div class="left-col">

      <!-- Add Expense Panel -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Add Expense</div>
          <span class="badge badge-accent">+ New</span>
        </div>
        <div class="panel-body">
          <div class="form-grid">

            <div class="form-group full">
              <label for="expTitle">Title</label>
              <input type="text" id="expTitle" placeholder="e.g. Lunch, Uber..." />
            </div>

            <div class="form-group">
              <label for="expAmount">Amount (₹)</label>
              <input type="number" id="expAmount" placeholder="0.00" min="0" step="0.01" />
            </div>

            <div class="form-group">
              <label for="expDate">Date</label>
              <input type="date" id="expDate" />
            </div>

            <div class="form-group full">
              <label for="expCategory">Category</label>
              <select id="expCategory">
                <option value="">Select category</option>
                <option value="Food">🍜 Food</option>
                <option value="Travel">✈ Travel</option>
                <option value="Shopping">🛍 Shopping</option>
                <option value="Entertainment">🎬 Entertainment</option>
                <option value="Health">💊 Health</option>
                <option value="Education">📚 Education</option>
                <option value="Utilities">💡 Utilities</option>
                <option value="Other">📦 Other</option>
              </select>
            </div>

          </div>
          <button class="btn-primary" id="addBtn">+ Add Expense</button>
        </div>
      </div>

      <!-- Monthly Budget Panel -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Monthly Budget</div>
        </div>
        <div class="panel-body">
          <div class="budget-row">
            <div class="form-group">
              <label for="budgetInput">Set Budget (₹)</label>
              <input type="number" id="budgetInput" placeholder="e.g. 30000" min="0" />
            </div>
            <button class="btn-set" id="setBudgetBtn">Set →</button>
          </div>
          <div class="budget-status" id="budgetStatus"></div>
        </div>
      </div>

    </div><!-- /left-col -->

    <!-- RIGHT COLUMN: Transaction List -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Transactions</div>
        <span class="badge badge-cyan" id="listCountBadge">0 items</span>
      </div>
      <div class="panel-body">

        <div class="filter-bar">
          <input type="text" id="searchInput" placeholder="🔍  Search..." />
          <select id="filterCategory">
            <option value="">All Categories</option>
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Education">Education</option>
            <option value="Utilities">Utilities</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="expense-list" id="expenseList"></div>

      </div>
    </div>

  </div><!-- /main-grid -->

  <!-- ═══════════════════════════ CHARTS ═══════════════════════════ -->
  <div class="charts-grid">
    <div class="chart-panel">
      <div class="chart-title">Spending by Category</div>
      <canvas id="pieChart" height="220"></canvas>
    </div>
    <div class="chart-panel">
      <div class="chart-title">Daily Spending (Last 7 Days)</div>
      <canvas id="barChart" height="220"></canvas>
    </div>
  </div>

</div><!-- /container -->

<!-- ═══════════════════════════ EDIT MODAL ═══════════════════════════ -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✏️ Edit Expense</div>
    <input type="hidden" id="editId" />
    <div class="form-grid">

      <div class="form-group full">
        <label for="editTitle">Title</label>
        <input type="text" id="editTitle" />
      </div>

      <div class="form-group">
        <label for="editAmount">Amount (₹)</label>
        <input type="number" id="editAmount" min="0" step="0.01" />
      </div>

      <div class="form-group">
        <label for="editDate">Date</label>
        <input type="date" id="editDate" />
      </div>

      <div class="form-group full">
        <label for="editCategory">Category</label>
        <select id="editCategory">
          <option value="Food">🍜 Food</option>
          <option value="Travel">✈ Travel</option>
          <option value="Shopping">🛍 Shopping</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Health">💊 Health</option>
          <option value="Education">📚 Education</option>
          <option value="Utilities">💡 Utilities</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>

    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="editCancel">Cancel</button>
      <button class="btn-primary btn-save" id="editSave">Save Changes</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════ TOAST ═══════════════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<script src="script.js"></script>
</body>
</html>
